<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#7bbf9e" />
<title>とこカルテ Ver.3</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
:root{--bg:#fffaf0;--card:#fff;--ink:#332a24;--muted:#796d63;--accent:#6fb994;--accent2:#e9f8f0;--warn:#e6a23c;--danger:#d85c5c;--line:#eadfce;--soft:#f7f0e6;--blue:#6aa6d8;}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;padding:12px 12px 88px;}
.container{max-width:820px;margin:auto}.hero{background:linear-gradient(135deg,#fff,#eefaf3);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 6px 18px rgba(60,40,20,.07);margin-bottom:12px}
h1{font-size:1.7rem;margin:0 0 4px}.sub{color:var(--muted);font-size:.92rem;margin:0}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 3px 12px rgba(60,40,20,.05)}
h2{font-size:1.25rem;margin:0 0 10px} h3{margin:14px 0 8px;font-size:1.05rem} label{display:block;font-weight:800;margin-top:12px}.hint{font-size:.82rem;color:var(--muted);font-weight:400} input,select,textarea,button{width:100%;font:inherit;border-radius:12px;border:1px solid #d8cab7;padding:10px;background:white;color:var(--ink)}
textarea{min-height:78px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.range-wrap{display:grid;grid-template-columns:1fr 48px;gap:8px;align-items:center}.value{text-align:center;background:var(--soft);border-radius:10px;padding:7px 0;font-weight:800}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.actions3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px}button{border:0;font-weight:900;cursor:pointer}.primary{background:var(--accent);color:white}.secondary{background:#efe6da}.danger{background:var(--danger);color:white}.blue{background:var(--blue);color:white}.small{font-size:.86rem;padding:8px}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.pill{border-radius:14px;background:var(--soft);padding:10px;text-align:center}.pill strong{display:block;font-size:1.15rem}.pill.warn{background:#fff4dc}.pill.good{background:var(--accent2)}.pill.bad{background:#ffe8e8}.log{border-top:1px dashed var(--line);padding-top:12px;margin-top:12px}.log-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.badge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:.78rem;background:var(--accent2);color:#356b55;margin:2px 3px 2px 0}.badge.warn{background:#fff4dc;color:#865900}.badge.danger{background:#ffe8e8;color:#8f2e2e}.badge.blue{background:#e7f3ff;color:#245a82}.muted{color:var(--muted)}.tabs{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);z-index:5}.tab{padding:10px 4px;text-align:center;font-size:.82rem;color:var(--muted)}.tab.active{color:#24634c;font-weight:900;background:#f1fbf6}.hidden{display:none!important}.report{white-space:pre-wrap;background:#fffdf8;border:1px solid var(--line);border-radius:12px;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.9rem;max-height:360px;overflow:auto}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}.day{min-height:52px;border:1px solid var(--line);border-radius:10px;background:#fff;padding:5px;font-size:.78rem}.day .num{font-weight:900}.icons{font-size:1rem;line-height:1.3}.canvas-wrap{overflow:auto}canvas{width:100%;max-width:760px;height:220px;background:#fffdf8;border:1px solid var(--line);border-radius:12px}.notice{border-left:5px solid var(--warn);background:#fff8e9;padding:10px;border-radius:10px;color:#654400}.dangerbox{border-left:5px solid var(--danger);background:#fff1f1;padding:10px;border-radius:10px;color:#7a2525}.linklike{color:#24634c;text-decoration:underline;cursor:pointer}
@media(max-width:650px){.row,.row3,.summary,.actions,.actions3{grid-template-columns:1fr} body{padding:10px 10px 88px}.card,.hero{border-radius:16px}.summary{grid-template-columns:1fr 1fr}.day{min-height:46px}}
</style>
</head>
<body>
<div class="container">
<section class="hero"><h1>🦜 とこカルテ Ver.3</h1><p class="sub">産卵・ホルモン治療・体調変化を、主治医に見せやすく記録するカルテ。オフライン対応。</p></section>

<section id="view-home" class="view">
  <div class="card"><h2>今日の状態</h2><div class="summary" id="summary"></div><p class="notice">目的は「産卵ゼロ」だけではなく、とこちゃんの消耗が減っているかを見ること。元気・ろう膜・体重・産卵間隔をセットで見る。</p></div>
  <div class="card"><h2>直近の記録</h2><div id="recentLogs"></div></div>
</section>

<section id="view-record" class="view hidden">
  <div class="card"><h2 id="formTitle">今日の記録</h2><form id="form">
    <input type="hidden" id="editId">
    <div class="row"><div><label>日付<input type="date" id="date" required></label></div><div><label>体重 g <span class="hint">任意</span><input type="number" id="weight" step="0.1" placeholder="例 42.5"></label></div></div>
    <div class="row3"><div><label>元気 0〜10</label><div class="range-wrap"><input type="range" id="energy" min="0" max="10" value="5"><div class="value" id="energyV">5</div></div></div><div><label>遊び 0〜10</label><div class="range-wrap"><input type="range" id="play" min="0" max="10" value="5"><div class="value" id="playV">5</div></div></div><div><label>食欲 0〜10</label><div class="range-wrap"><input type="range" id="appetite" min="0" max="10" value="5"><div class="value" id="appetiteV">5</div></div></div></div>
    <div class="row"><div><label>うんちの状態<select id="poop"><option>いつも通り</option><option>水っぽい</option><option>少ない</option><option>色が違う</option><option>未消化っぽい</option><option>その他</option></select></label></div><div><label>ろう膜<select id="cere"><option>いつも通り</option><option>色が悪い</option><option>乾燥ぎみ</option><option>濃い/茶色っぽい</option><option>腫れ・違和感</option><option>その他</option></select></label></div></div>
    <div class="row"><div><label>触診<select id="touch"><option>いつも通り</option><option>お腹が張る感じ</option><option>嫌がる</option><option>不明</option><option>その他</option></select></label></div><div><label>発情レベル 0〜5</label><div class="range-wrap"><input type="range" id="heat" min="0" max="5" value="0"><div class="value" id="heatV">0</div></div></div></div>
    <h3>発情・産卵</h3><div class="row3"><div><label>産卵<select id="egg"><option>なし</option><option>あり</option><option>疑い</option></select></label></div><div><label>産卵数<input type="number" id="eggCount" min="0" step="1" value="0"></label></div><div><label>抱卵<select id="brood"><option>なし</option><option>あり</option><option>強い</option></select></label></div></div>
    <div class="row3"><label><input type="checkbox" id="nesting"> 巣探し</label><label><input type="checkbox" id="mateReaction"> とむへの反応強い</label><label><input type="checkbox" id="mating"> 交尾行動/姿勢</label></div>
    <h3>治療・受診</h3><div class="row"><div><label>できごと<select id="event"><option>通常記録</option><option>ホルモン注射</option><option>受診</option><option>薬</option><option>体調急変</option></select></label></div><div><label>薬剤名・処置 <span class="hint">任意</span><input type="text" id="medicine" placeholder="例：薬剤名不明、ホルモン注射"></label></div></div>
    <label>メモ<textarea id="memo" placeholder="ろう膜、眠り方、便、先生に伝えたいことなど"></textarea></label>
    <div class="actions"><button class="primary" type="submit">保存</button><button class="secondary" type="button" id="resetBtn">入力リセット</button></div>
  </form></div>
</section>

<section id="view-list" class="view hidden"><div class="card"><h2>記録一覧</h2><div class="actions3"><button class="blue small" id="exportCsv">CSV出力</button><button class="secondary small" id="copyBackup">バックアップコピー</button><button class="danger small" id="clearAll">全削除</button></div><label>バックアップ復元<textarea id="restoreText" placeholder="バックアップ文字列を貼り付け"></textarea></label><button class="secondary small" id="restoreBtn">復元する</button><div id="allLogs"></div></div></section>

<section id="view-chart" class="view hidden"><div class="card"><h2>推移・カレンダー</h2><div class="canvas-wrap"><canvas id="chart" width="760" height="240"></canvas></div><h3>今月のカレンダー</h3><div id="calTitle" class="muted"></div><div class="calendar" id="calendar"></div></div></section>

<section id="view-report" class="view hidden"><div class="card"><h2>診察用まとめ</h2><p class="muted">このまま先生に見せる／コピーしてメモへ貼る用。</p><div class="actions"><button class="primary" id="makeReport">まとめ更新</button><button class="secondary" id="copyReport">コピー</button></div><div id="report" class="report"></div></div></section>
</div>

<nav class="tabs"><div class="tab active" data-view="home">🏠<br>トップ</div><div class="tab" data-view="record">✍️<br>記録</div><div class="tab" data-view="list">📋<br>一覧</div><div class="tab" data-view="chart">📈<br>推移</div></nav>

<script>
const KEY='tokoKarteV2Records';
const $=id=>document.getElementById(id);
const fields=['date','weight','energy','play','appetite','poop','cere','touch','heat','egg','eggCount','brood','nesting','mateReaction','mating','event','medicine','memo'];
function today(){const d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,10)}
function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return[]}}
function save(arr){localStorage.setItem(KEY,JSON.stringify(arr)); renderAll()}
function daysBetween(a,b=today()){if(!a)return null; return Math.floor((new Date(b)-new Date(a))/(86400000))}
function sorted(){return load().sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id)}
function val(id){const el=$(id); return el.type==='checkbox'?el.checked:el.value}
function setVal(id,v){const el=$(id); if(el.type==='checkbox')el.checked=!!v; else el.value=v??''; if(['energy','play','appetite','heat'].includes(id)) $(id+'V').textContent=el.value}
['energy','play','appetite','heat'].forEach(id=>$(id).addEventListener('input',e=>$(id+'V').textContent=e.target.value));
$('date').value=today();
$('form').addEventListener('submit',e=>{e.preventDefault(); const rec={}; fields.forEach(f=>rec[f]=val(f)); rec.id=$('editId').value?Number($('editId').value):Date.now(); rec.savedAt=new Date().toISOString(); let arr=load().filter(x=>x.id!==rec.id); arr.push(rec); save(arr); resetForm(); showView('home')});
function resetForm(){ $('formTitle').textContent='今日の記録'; $('editId').value=''; $('date').value=today(); ['weight','medicine','memo'].forEach(id=>setVal(id,'')); ['energy','play','appetite'].forEach(id=>setVal(id,5)); setVal('heat',0); setVal('eggCount',0); ['poop','cere','touch','egg','brood','event'].forEach(id=>$(id).selectedIndex=0); ['nesting','mateReaction','mating'].forEach(id=>setVal(id,false));}
$('resetBtn').onclick=resetForm;
function latestEvent(eventName){return sorted().find(r=>r.event===eventName || (eventName==='産卵' && (r.egg==='あり'||Number(r.eggCount)>0)))}
function renderSummary(){const arr=sorted(); const last=arr[0]; const egg=latestEvent('産卵'); const shot=latestEvent('ホルモン注射'); const visit=latestEvent('受診'); const avg=n=>{const xs=arr.slice(0,n).map(r=>Number(r.energy)).filter(Number.isFinite); return xs.length?(xs.reduce((a,b)=>a+b,0)/xs.length).toFixed(1):'--'}; const items=[['最終産卵',egg?daysBetween(egg.date)+'日前':'記録なし',egg?'🥚 '+egg.date:''],['最終注射',shot?daysBetween(shot.date)+'日前':'記録なし',shot?'💉 '+shot.date:''],['最新元気',last?last.energy+'/10':'--',last?last.date:''],['7件平均元気',avg(7),visit?'前回受診 '+visit.date:'']]; $('summary').innerHTML=items.map(x=>`<div class="pill ${x[0].includes('産卵')?'warn':'good'}"><strong>${x[1]}</strong><span>${x[0]}</span><br><small class="muted">${x[2]}</small></div>`).join('')}
function badges(r){let b=[]; if(r.egg==='あり'||Number(r.eggCount)>0)b.push(['🥚産卵 '+(r.eggCount||''),'warn']); if(r.event==='ホルモン注射')b.push(['💉注射','blue']); if(r.event==='受診')b.push(['🏥受診','blue']); if(Number(r.energy)<=3)b.push(['元気低め','danger']); if(r.cere&&r.cere!=='いつも通り')b.push(['ろう膜 '+r.cere,'warn']); if(Number(r.heat)>=4)b.push(['発情強め','warn']); return b.map(x=>`<span class="badge ${x[1]}">${x[0]}</span>`).join('')}
function logHtml(r){return `<div class="log"><div class="log-head"><div><strong>${r.date}</strong><br>${badges(r)}<div class="muted">体重 ${r.weight||'--'}g / 元気 ${r.energy}/10 / 遊び ${r.play}/10 / 食欲 ${r.appetite}/10 / 発情 ${r.heat}/5</div></div><div><button class="small secondary" onclick="editRec(${r.id})">編集</button><button class="small danger" onclick="delRec(${r.id})">削除</button></div></div><div>うんち：${r.poop}　ろう膜：${r.cere}　触診：${r.touch}</div>${r.medicine?`<div>薬剤・処置：${escapeHtml(r.medicine)}</div>`:''}${r.memo?`<div class="muted">${escapeHtml(r.memo)}</div>`:''}</div>`}
function renderLogs(){const arr=sorted(); $('recentLogs').innerHTML=arr.length?arr.slice(0,5).map(logHtml).join(''):'まだ記録がありません。'; $('allLogs').innerHTML=arr.length?arr.map(logHtml).join(''):'まだ記録がありません。'}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
window.editRec=id=>{const r=load().find(x=>x.id===id); if(!r)return; fields.forEach(f=>setVal(f,r[f])); $('editId').value=r.id; $('formTitle').textContent='記録を編集'; showView('record')}
window.delRec=id=>{if(confirm('この記録を削除する？')) save(load().filter(x=>x.id!==id))}
function showView(name){document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden')); $('view-'+name).classList.remove('hidden'); document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===name)); if(name==='chart'){drawChart(); renderCalendar()} if(name==='report')makeReport()}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>showView(t.dataset.view));
function drawChart(){const c=$('chart'),ctx=c.getContext('2d'),arr=load().sort((a,b)=>a.date.localeCompare(b.date)).slice(-30); ctx.clearRect(0,0,c.width,c.height); ctx.fillStyle='#fffdf8';ctx.fillRect(0,0,c.width,c.height); ctx.strokeStyle='#eadfce'; for(let i=0;i<=10;i++){let y=210-i*18; ctx.beginPath();ctx.moveTo(40,y);ctx.lineTo(740,y);ctx.stroke(); ctx.fillStyle='#796d63';ctx.fillText(i,18,y+4)} if(arr.length<2){ctx.fillStyle='#796d63';ctx.fillText('記録が2件以上になるとグラフ表示します',60,120);return} const series=[['energy','元気'],['play','遊び'],['appetite','食欲']]; series.forEach((s,si)=>{ctx.beginPath(); arr.forEach((r,i)=>{let x=50+i*(680/Math.max(1,arr.length-1)); let y=210-Number(r[s[0]])*18; if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y)}); ctx.lineWidth=2+si; ctx.strokeStyle=['#6fb994','#6aa6d8','#e6a23c'][si]; ctx.stroke(); ctx.fillStyle=ctx.strokeStyle; ctx.fillText(s[1],620,24+si*20)});}
function renderCalendar(){const arr=load(); const now=new Date(); const y=now.getFullYear(),m=now.getMonth(); $('calTitle').textContent=`${y}年${m+1}月`; const first=new Date(y,m,1), last=new Date(y,m+1,0); let html=''; ['日','月','火','水','木','金','土'].forEach(d=>html+=`<div class="day"><strong>${d}</strong></div>`); for(let i=0;i<first.getDay();i++)html+='<div class="day"></div>'; for(let d=1;d<=last.getDate();d++){const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const rs=arr.filter(r=>r.date===ds); let icons=rs.map(r=>(r.egg==='あり'||Number(r.eggCount)>0?'🥚':'')+(r.event==='ホルモン注射'?'💉':'')+(r.event==='受診'?'🏥':'')+(Number(r.energy)<=3?'⚠️':'')).join(' '); html+=`<div class="day"><div class="num">${d}</div><div class="icons">${icons}</div></div>`} $('calendar').innerHTML=html}
function makeReport(){const arr=sorted(), recent=arr.slice(0,30), egg=latestEvent('産卵'), shot=latestEvent('ホルモン注射'); const avg=f=>{const xs=recent.map(r=>Number(r[f])).filter(Number.isFinite); return xs.length?(xs.reduce((a,b)=>a+b,0)/xs.length).toFixed(1):'--'}; const eggCount=recent.filter(r=>r.egg==='あり'||Number(r.eggCount)>0).reduce((a,r)=>a+Number(r.eggCount||1),0); let text=`とこカルテ 診察用まとめ\n作成日：${today()}\n\n最終産卵：${egg?egg.date+'（'+daysBetween(egg.date)+'日前）':'記録なし'}\n最終ホルモン注射：${shot?shot.date+'（'+daysBetween(shot.date)+'日前）':'記録なし'}\n直近30件の産卵数：${eggCount}\n平均 元気：${avg('energy')}/10\n平均 遊び：${avg('play')}/10\n平均 食欲：${avg('appetite')}/10\n\n直近記録：\n`; recent.slice(0,10).forEach(r=>{text+=`\n${r.date} 体重${r.weight||'--'}g 元気${r.energy} 遊び${r.play} 食欲${r.appetite} 発情${r.heat}/5 うんち:${r.poop} ろう膜:${r.cere} 産卵:${r.egg}${r.eggCount&&Number(r.eggCount)>0?' '+r.eggCount+'個':''} ${r.event!=='通常記録'?' 出来事:'+r.event:''}${r.medicine?' 処置:'+r.medicine:''}${r.memo?'\n  メモ:'+r.memo:''}\n`}); $('report').textContent=text; return text}
$('makeReport').onclick=makeReport; $('copyReport').onclick=()=>navigator.clipboard.writeText(makeReport()).then(()=>alert('コピーしました'));
$('exportCsv').onclick=()=>{const arr=load().sort((a,b)=>a.date.localeCompare(b.date)); const header=fields.filter(f=>f!=='memo').concat(['memo']); const csv=[header.join(',')].concat(arr.map(r=>header.map(h=>'"'+String(r[h]??'').replace(/"/g,'""')+'"').join(','))).join('\n'); const blob=new Blob([csv],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='toko_karte.csv'; a.click()}
$('copyBackup').onclick=()=>navigator.clipboard.writeText(JSON.stringify(load())).then(()=>alert('バックアップをコピーしました'));
$('restoreBtn').onclick=()=>{try{const arr=JSON.parse($('restoreText').value); if(!Array.isArray(arr))throw new Error(); if(confirm('現在の記録を上書きして復元します。よい？')) save(arr)}catch(e){alert('復元できません。文字列を確認してね')}};
$('clearAll').onclick=()=>{if(confirm('全記録を削除します。本当に？')) save([])};
function renderAll(){renderSummary();renderLogs();drawChart();renderCalendar();makeReport()}
renderAll();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(() => {});
  });
}
</script>
</body>
</html>
