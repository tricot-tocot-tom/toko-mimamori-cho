<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>とこのみまもり帳</title>
<style>
:root{--bg:#fffaf0;--card:#ffffff;--ink:#3b3028;--muted:#7b6d63;--accent:#7bbf9e;--warn:#e6a23c;--danger:#d85c5c;--line:#eadfce;}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;padding:16px;}
.container{max-width:760px;margin:0 auto 80px}.hero{background:linear-gradient(135deg,#fff,#eefaf3);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 6px 18px rgba(60,40,20,.07)}
h1{font-size:1.55rem;margin:0 0 4px}.sub{color:var(--muted);font-size:.92rem;margin:0}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-top:14px;box-shadow:0 3px 12px rgba(60,40,20,.05)}
label{display:block;font-weight:700;margin-top:12px}.hint{font-size:.82rem;color:var(--muted);font-weight:400} input,select,textarea,button{width:100%;font:inherit;border-radius:12px;border:1px solid #d8cab7;padding:10px;background:white;color:var(--ink)}
textarea{min-height:78px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.range-wrap{display:grid;grid-template-columns:1fr 48px;gap:8px;align-items:center}.value{text-align:center;background:#f7f0e6;border-radius:10px;padding:7px 0;font-weight:700}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.actions button{border:0;font-weight:800;cursor:pointer}.primary{background:var(--accent);color:white}.secondary{background:#efe6da}.danger{background:var(--danger);color:white}.small{font-size:.86rem;padding:8px}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.pill{border-radius:14px;background:#f7f0e6;padding:10px;text-align:center}.pill strong{display:block;font-size:1.15rem}.log{border-top:1px dashed var(--line);padding-top:12px;margin-top:12px}.log-head{display:flex;justify-content:space-between;gap:8px;align-items:center}.badge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:.78rem;background:#eefaf3;color:#356b55;margin-right:4px}.badge.warn{background:#fff4dc;color:#865900}.badge.danger{background:#ffe8e8;color:#8f2e2e}.muted{color:var(--muted)}
@media(max-width:600px){.row,.summary,.actions{grid-template-columns:1fr} body{padding:10px}.card,.hero{border-radius:16px}}
</style>
</head>
<body>
<div class="container">
  <section class="hero">
    <h1>🦜 とこのみまもり帳</h1>
    <p class="sub">産卵・ホルモン治療後の体調を、短く・毎日・主治医に見せやすく記録する帳面。</p>
  </section>

  <section class="card">
    <h2>今日の記録</h2>
    <form id="form">
      <div class="row">
        <div><label>日付<input type="date" id="date" required></label></div>
        <div><label>体重 g <span class="hint">任意</span><input type="number" id="weight" step="0.1" placeholder="例 42.5"></label></div>
      </div>

      <label>元気 0〜10</label><div class="range-wrap"><input type="range" id="energy" min="0" max="10" value="5"><div class="value" id="energyV">5</div></div>
      <label>遊び 0〜10</label><div class="range-wrap"><input type="range" id="play" min="0" max="10" value="5"><div class="value" id="playV">5</div></div>

      <div class="row">
        <div><label>うんちの状態<select id="poop"><option>いつも通り</option><option>水っぽい</option><option>少ない</option><option>色が違う</option><option>未消化っぽい</option><option>その他</option></select></label></div>
        <div><label>ろう膜<select id="cere"><option>いつも通り</option><option>色が悪い</option><option>乾燥ぎみ</option><option>濃い/茶色っぽい</option><option>腫れ・違和感</option><option>その他</option></select></label></div>
      </div>

      <div class="row">
        <div><label>触診・お腹<select id="palpation"><option>異常なし</option><option>張りがある</option><option>硬い感じ</option><option>嫌がる</option><option>未確認</option><option>その他</option></select></label></div>
        <div><label>発情行動<select id="heat"><option>なし</option><option>軽い</option><option>強い</option><option>吐き戻し</option><option>巣探し</option><option>交尾/交尾姿勢</option></select></label></div>
      </div>

      <div class="row">
        <div><label>産卵<select id="egg"><option>なし</option><option>あり 1個</option><option>あり 2個</option><option>あり 3個以上</option><option>抱卵中</option></select></label></div>
        <div><label>ホルモン治療<select id="hormone"><option>なし</option><option>注射当日</option><option>注射後 経過観察中</option><option>副作用疑いあり</option></select></label></div>
      </div>

      <label>メモ <span class="hint">食欲・眠気・とむとの接触・気になる様子</span><textarea id="memo" placeholder="例：午前は眠そう。放鳥時とむとは接触なし。食欲あり。"></textarea></label>

      <div class="actions"><button class="primary" type="submit">記録する</button><button class="secondary" type="button" id="clearForm">入力をリセット</button></div>
    </form>
  </section>

  <section class="card">
    <h2>見える化</h2>
    <div class="summary">
      <div class="pill"><span>直近7日 平均元気</span><strong id="avgEnergy">-</strong></div>
      <div class="pill"><span>直近7日 平均遊び</span><strong id="avgPlay">-</strong></div>
      <div class="pill"><span>直近30日 産卵</span><strong id="eggCount">-</strong></div>
    </div>
    <p class="hint">元気3以下、遊び3以下、色が悪い、産卵あり、副作用疑いは記録に目印が付きます。</p>
  </section>

  <section class="card">
    <h2>記録一覧</h2>
    <div class="actions"><button class="secondary small" type="button" id="exportBtn">CSV保存</button><button class="danger small" type="button" id="deleteAll">全削除</button></div>
    <div id="logs"></div>
  </section>
</div>
<script>
const KEY='toko_mimamori_records_v1';
const $=id=>document.getElementById(id);
const fields=['date','weight','energy','play','poop','cere','palpation','heat','egg','hormone','memo'];
function today(){const d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,10)}
$('date').value=today();
['energy','play'].forEach(id=>$(id).addEventListener('input',()=>$(id+'V').textContent=$(id).value));
function load(){return JSON.parse(localStorage.getItem(KEY)||'[]')}
function save(data){localStorage.setItem(KEY,JSON.stringify(data))}
function resetForm(){ $('form').reset(); $('date').value=today(); $('energy').value=5; $('play').value=5; $('energyV').textContent=5; $('playV').textContent=5; }
$('clearForm').onclick=resetForm;
$('form').addEventListener('submit',e=>{e.preventDefault(); const rec={id:Date.now()}; fields.forEach(f=>rec[f]=$(f).value); const data=load(); const i=data.findIndex(r=>r.date===rec.date); if(i>=0 && confirm('同じ日付の記録があります。上書きしますか？')) data[i]=rec; else if(i>=0) data.push(rec); else data.push(rec); data.sort((a,b)=>b.date.localeCompare(a.date)); save(data); resetForm(); render();});
function riskBad(r){return Number(r.energy)<=3||Number(r.play)<=3||r.cere!=='いつも通り'||r.egg!=='なし'||r.hormone==='副作用疑いあり'}
function render(){const data=load(); const logs=$('logs'); logs.innerHTML=''; const now=new Date(today()); const last7=data.filter(r=>(now-new Date(r.date))/(864e5)<=7); const last30=data.filter(r=>(now-new Date(r.date))/(864e5)<=30); const avg=(arr,k)=>arr.length?(arr.reduce((s,r)=>s+Number(r[k]||0),0)/arr.length).toFixed(1):'-'; $('avgEnergy').textContent=avg(last7,'energy'); $('avgPlay').textContent=avg(last7,'play'); $('eggCount').textContent=last30.filter(r=>r.egg!=='なし'&&r.egg!=='抱卵中').length+'日';
 if(!data.length){logs.innerHTML='<p class="muted">まだ記録がありません。</p>';return}
 data.forEach(r=>{const div=document.createElement('div');div.className='log'; const badges=[]; if(Number(r.energy)<=3)badges.push('<span class="badge danger">元気低め</span>'); if(Number(r.play)<=3)badges.push('<span class="badge warn">遊び低め</span>'); if(r.cere!=='いつも通り')badges.push('<span class="badge warn">ろう膜</span>'); if(r.egg!=='なし')badges.push('<span class="badge warn">産卵/抱卵</span>'); if(r.hormone==='副作用疑いあり')badges.push('<span class="badge danger">副作用疑い</span>');
 div.innerHTML=`<div class="log-head"><strong>${r.date}</strong><button class="small secondary" data-del="${r.id}" style="width:auto">削除</button></div>${badges.join('')}<p>元気 ${r.energy}/10　遊び ${r.play}/10　体重 ${r.weight||'-'}g</p><p>うんち：${r.poop}／ろう膜：${r.cere}／触診：${r.palpation}</p><p>発情：${r.heat}／産卵：${r.egg}／ホルモン：${r.hormone}</p>${r.memo?`<p class="muted">${escapeHtml(r.memo)}</p>`:''}`; logs.appendChild(div);}); document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{save(load().filter(r=>String(r.id)!==String(b.dataset.del)));render();});}
function escapeHtml(s){return s.replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
$('deleteAll').onclick=()=>{if(confirm('全記録を削除しますか？')){save([]);render();}}
$('exportBtn').onclick=()=>{const data=load(); const head=fields.join(','); const rows=data.map(r=>fields.map(f=>'"'+String(r[f]||'').replaceAll('"','""')+'"').join(',')); const blob=new Blob(['\ufeff'+head+'\n'+rows.join('\n')],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='toko_mimamori_records.csv'; a.click(); URL.revokeObjectURL(a.href);}
render();
</script>
</body>
</html>
